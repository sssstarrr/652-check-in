name: Daily 652 Check-in

# Archived example only. This workflow is intentionally stored outside
# .github/workflows, so GitHub will not run it automatically.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only validate secrets and print planned accounts"
        required: false
        default: false
        type: boolean
  schedule:
    # GitHub cron uses UTC and can be delayed. Wake up early and often, then gate by Beijing time below.
    # 08:01-15:56 UTC = 16:01-23:56 Asia/Shanghai.
    - cron: "1,6,11,16,21,26,31,36,41,46,51,56 8-15 * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: daily-652-checkin
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Compute Beijing date
        id: clock
        shell: bash
        run: |
          beijing_date="$(TZ=Asia/Shanghai date +%F)"
          beijing_time="$(TZ=Asia/Shanghai date +%H:%M)"
          should_run=false
          if [[ "${{ github.event_name }}" != "schedule" ]] || { [[ "$beijing_time" > "19:30" ]] && [[ "$beijing_time" < "23:56" ]]; }; then
            should_run=true
          fi
          echo "date=$beijing_date" >> "$GITHUB_OUTPUT"
          echo "time=$beijing_time" >> "$GITHUB_OUTPUT"
          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "Beijing time: $beijing_date $beijing_time, should_run=$should_run"

      - name: Skip outside check-in window
        if: github.event_name == 'schedule' && steps.clock.outputs.should_run != 'true'
        shell: bash
        run: echo "北京时间 ${{ steps.clock.outputs.date }} ${{ steps.clock.outputs.time }} 不在 19:31-23:55 打卡窗口内，本次唤醒跳过。"

      - name: Restore success marker
        id: success-marker
        if: steps.clock.outputs.should_run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .checkin-success
          key: 652-checkin-success-${{ steps.clock.outputs.date }}

      - name: Check previous successful run
        id: previous-success
        if: steps.clock.outputs.should_run == 'true' && github.event_name == 'schedule' && steps.success-marker.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: daily-checkin.yml
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import sys
          import urllib.request
          import json
          from datetime import datetime, time, timedelta, timezone
          from zoneinfo import ZoneInfo

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          workflow_file = os.environ.get("WORKFLOW_FILE", "daily-checkin.yml")
          token = os.environ.get("GITHUB_TOKEN", "")
          current_run_id = str(os.environ.get("GITHUB_RUN_ID", ""))
          tz = ZoneInfo("Asia/Shanghai")
          today = datetime.now(tz).date()
          start = datetime.combine(today, time.min, tz).astimezone(timezone.utc)
          end = start + timedelta(days=1)

          found = False
          try:
              url = f"https://api.github.com/repos/{repo}/actions/workflows/{workflow_file}/runs?per_page=50"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "User-Agent": "652-check-in-action",
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              for run in payload.get("workflow_runs", []):
                  if str(run.get("id")) == current_run_id:
                      continue
                  if run.get("conclusion") != "success":
                      continue
                  if "dry-run" in str(run.get("display_title") or "").lower():
                      continue
                  created_at = datetime.fromisoformat(str(run.get("created_at")).replace("Z", "+00:00"))
                  if start <= created_at < end:
                      found = True
                      print(f"reason=已有成功运行 {run.get('html_url')}", file=sys.stderr)
                      break
          except Exception as exc:
              print(f"warning=检查历史成功运行失败，将继续执行打卡：{exc}", file=sys.stderr)

          print(f"found={'true' if found else 'false'}")
          PY

      - name: Skip because already succeeded today
        if: steps.clock.outputs.should_run == 'true' && github.event_name == 'schedule' && (steps.success-marker.outputs.cache-hit == 'true' || steps.previous-success.outputs.found == 'true')
        shell: bash
        run: echo "北京时间 ${{ steps.clock.outputs.date }} 已有成功打卡，本次定时任务跳过。"

      - name: Checkout
        if: steps.clock.outputs.should_run == 'true' && (github.event_name != 'schedule' || (steps.success-marker.outputs.cache-hit != 'true' && steps.previous-success.outputs.found != 'true'))
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.clock.outputs.should_run == 'true' && (github.event_name != 'schedule' || (steps.success-marker.outputs.cache-hit != 'true' && steps.previous-success.outputs.found != 'true'))
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        if: steps.clock.outputs.should_run == 'true' && (github.event_name != 'schedule' || (steps.success-marker.outputs.cache-hit != 'true' && steps.previous-success.outputs.found != 'true'))
        run: python -m pip install -r requirements-action.txt

      - name: Run check-in
        id: run-checkin
        if: steps.clock.outputs.should_run == 'true' && (github.event_name != 'schedule' || (steps.success-marker.outputs.cache-hit != 'true' && steps.previous-success.outputs.found != 'true'))
        env:
          QFHY_SESSION: ${{ secrets.QFHY_SESSION }}
          CHECKIN_ACCOUNTS_JSON: ${{ secrets.CHECKIN_ACCOUNTS_JSON }}
          CHECKIN_CAMPUS: ${{ vars.CHECKIN_CAMPUS || '宜宾' }}
          CHECKIN_LOCATION_MODE: ${{ vars.CHECKIN_LOCATION_MODE || 'default' }}
          CHECKIN_LOCATION_INDEX: ${{ vars.CHECKIN_LOCATION_INDEX || '0' }}
          CHECKIN_RANDOM_OFFSET: ${{ vars.CHECKIN_RANDOM_OFFSET || 'false' }}
          CHECKIN_MAX_OFFSET_METERS: ${{ vars.CHECKIN_MAX_OFFSET_METERS || '35' }}
          CHECKIN_TIMEOUT: ${{ vars.CHECKIN_TIMEOUT || '20' }}
          CHECKIN_TIMEZONE: Asia/Shanghai
          TZ: Asia/Shanghai
        shell: bash
        run: |
          EXTRA_ARGS=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS+=(--dry-run)
          fi
          python -m app.cli.checkin_once "${EXTRA_ARGS[@]}"

      - name: Write success marker
        if: steps.clock.outputs.should_run == 'true' && steps.success-marker.outputs.cache-hit != 'true' && (steps.previous-success.outputs.found == 'true' || steps.run-checkin.outcome == 'success') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        shell: bash
        run: |
          mkdir -p .checkin-success
          {
            echo "date=${{ steps.clock.outputs.date }}"
            echo "run_id=${{ github.run_id }}"
            echo "event=${{ github.event_name }}"
          } > ".checkin-success/${{ steps.clock.outputs.date }}.txt"

      - name: Save success marker
        if: steps.clock.outputs.should_run == 'true' && steps.success-marker.outputs.cache-hit != 'true' && (steps.previous-success.outputs.found == 'true' || steps.run-checkin.outcome == 'success') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .checkin-success
          key: 652-checkin-success-${{ steps.clock.outputs.date }}
